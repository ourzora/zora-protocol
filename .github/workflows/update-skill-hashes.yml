name: Update Skill Hashes

on:
  workflow_dispatch: # Manual trigger only - run when skills are updated on the server

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Pin actions to commit SHAs for supply chain security
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: pnpm/action-setup@fe02b74ab83b1097ba69cf088df9a5cdddaa5e49 # v2
        with:
          version: 9

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for hash changes
        id: check
        continue-on-error: true
        run: |
          cd packages/cli
          npx tsx scripts/generate-skill-hashes.ts --check

      - name: Update hashes if changed
        if: steps.check.outcome == 'failure'
        run: |
          cd packages/cli
          npx tsx scripts/generate-skill-hashes.ts --write

      - name: Create Pull Request
        if: steps.check.outcome == 'failure'
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(cli): update skill integrity hashes"
          title: "chore(cli): update skill integrity hashes"
          body: |
            Automated update of skill integrity hashes.

            Skills on `agents.zora.com` have changed. This PR updates the SHA-256 hashes in `skills.ts` to match.

            **Review checklist:**
            - [ ] Verify the skill changes are expected
            - [ ] Merge to include in next CLI release
          branch: chore/update-skill-hashes
          delete-branch: true
          labels: |
            automated
            cli
