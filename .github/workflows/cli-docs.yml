name: Vercel CLI Docs Deployment
on:
  push:
    branches:
      - main
    paths:
      - "cli-docs/**"
      - "packages/cli/SKILL.md"
  workflow_dispatch:

jobs:
  Deploy:
    if: github.event.repository.name == 'zora-protocol' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_CLI_DOCS_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install node deps
        uses: ./.github/actions/setup_deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: RM Vercel Cache
        run: rm -rf .vercel

      - name: Copy SKILL.md
        run: cp packages/cli/SKILL.md cli-docs/docs/public/skill.md

      - name: Pull Vercel Environment Information
        working-directory: ./cli-docs
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        working-directory: ./cli-docs
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SITE_ROOT_URL: ${{ vars.CLI_DOCS_SITE_ROOT_URL }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./cli-docs
