name: Changesets Version and Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install node deps and foundry
        uses: ./.github/actions/setup_deps

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@06245a4e0a36c064a573d4150030f5ec548e4fcc # v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          version: pnpm run update-version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  cli-binaries:
    name: Build and upload CLI binaries
    needs: release
    if: >-
      needs.release.outputs.published == 'true' &&
      contains(needs.release.outputs.publishedPackages, '"name":"@zoralabs/cli"')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main

      - name: Extract CLI version
        id: cli-version
        run: |
          VERSION=$(echo '${{ needs.release.outputs.publishedPackages }}' | jq -r '.[] | select(.name == "@zoralabs/cli") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=@zoralabs/cli@$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install node deps and foundry
        uses: ./.github/actions/setup_deps

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Debug Bun environment
        run: |
          echo "=== Bun version ==="
          bun --version
          echo "=== Node version ==="
          node --version
          echo "=== Disk space ==="
          df -h .
          echo "=== Memory ==="
          free -h
          echo "=== DNS check ==="
          nslookup registry.npmjs.org || true
          echo "=== Network connectivity ==="
          curl -sI https://registry.npmjs.org/ | head -5 || true
          echo "=== pnpm workspace packages ==="
          pnpm ls --depth 0 --filter @zoralabs/cli... 2>&1 | head -30 || true

      - name: Install dependencies with Bun
        working-directory: packages/cli
        run: |
          echo "=== Installing CLI deps with Bun ==="
          echo "=== package.json deps ==="
          node -p "JSON.stringify(Object.keys(require('./package.json').dependencies), null, 2)"
          echo "=== Starting bun install ==="
          bun install --verbose --ignore-scripts 2>&1 &
          BUN_PID=$!
          # Monitor progress - if it hangs for 2 minutes, dump debug info
          SECONDS=0
          while kill -0 $BUN_PID 2>/dev/null; do
            if [ $SECONDS -ge 120 ]; then
              echo "=== bun install still running after ${SECONDS}s, dumping debug info ==="
              echo "=== Process tree ==="
              ps aux | grep -i bun || true
              echo "=== Open network connections ==="
              ss -tnp 2>/dev/null || netstat -tnp 2>/dev/null || true
              echo "=== /proc/$BUN_PID/status ==="
              cat /proc/$BUN_PID/status 2>/dev/null || true
              SECONDS=0
            fi
            sleep 5
          done
          wait $BUN_PID
        timeout-minutes: 5

      - name: Build binaries for all platforms
        working-directory: packages/cli
        run: pnpm run build:binary:all

      - name: Generate checksums
        working-directory: packages/cli/bin
        run: |
          sha256sum zora-darwin-arm64 zora-darwin-x64 zora-linux-x64 zora-linux-arm64 zora-windows-x64.exe > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.cli-version.outputs.tag }}"
          gh release upload "$TAG" \
            packages/cli/bin/zora-darwin-arm64 \
            packages/cli/bin/zora-darwin-x64 \
            packages/cli/bin/zora-linux-x64 \
            packages/cli/bin/zora-linux-arm64 \
            packages/cli/bin/zora-windows-x64.exe \
            packages/cli/bin/checksums-sha256.txt \
            --clobber
